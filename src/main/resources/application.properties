spring.application.name=rumex-ott-mediaStat-service
server.port=8084

# ===============================
# Database Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://rumex-ott-cms.c942aygqkw16.ap-southeast-1.rds.amazonaws.com:3306/derana-ott-stg?createDatabaseIfNotExist=true
spring.datasource.username=admin
spring.datasource.password=C3trPsxlkgJ5Ywbp
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=15
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1740000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_DETECTION_MS:0}

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=false
spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# ===============================
# Redis / Cache
# ===============================
spring.data.redis.host=ott-redis-cache.sraqxo.ng.0001.apse1.cache.amazonaws.com
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.cache.type=redis
app.cache.persistence.cron=0 */2 * * * *
app.cache.persistence.enabled=${APP_CACHE_PERSISTENCE_ENABLED:true}

# ===============================
# Logging
# ===============================
logging.level.root=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.springframework.jdbc.core=OFF
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=OFF
logging.level.com.mysql.cj=OFF
logging.level.org.springframework.data.redis=ERROR
logging.level.org.springframework.cache=ERROR
logging.level.lk.rumex.rumex_ott_mediaStat.mediaStatistics.service=INFO

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# Summary Rebuild Bootstrap
# ===============================
summary.rebuild.bootstrap.enabled=${SUMMARY_REBUILD_BOOTSTRAP_ENABLED:true}
summary.rebuild.bootstrap.start-date=2026-01-01
summary.rebuild.bootstrap.target-date=2026-03-18

# Concurrent stream restriction
concurrency.stream-limit.enabled=true
concurrency.stream-limit.max-active-streams=1
concurrency.stream-limit.active-window-seconds=70
